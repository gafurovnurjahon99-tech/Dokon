<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Smart Store Pro</title>
</head>
<body>
    <div id="usercard" class="usercard">
        <span id="username">Yuklanmoqda...</span>
        <button onclick="openAdmin()" class="admin-btn-icon">⚙️</button>
    </div>

    <div id="status-bar" class="status-bar" style="display:none;">
        <span>Buyurtmangiz: <b id="order-status-text">...</b></span>
        <div class="status-dots">
            <div class="dot" id="dot-1"></div>
            <div class="dot" id="dot-2"></div>
            <div class="dot" id="dot-3"></div>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="Mahsulot qidirish..." oninput="searchProducts(this.value)">
    </div>

    <div class="categories" id="category-list"></div>

    <div class="container">
        <div class="inner" id="product-grid"></div>
    </div>

    <div id="quick-view-modal" class="modal">
        <div class="modal-content quick-box">
            <button class="close-x" onclick="closeQuickView()">&times;</button>
            <div class="qv-body">
                <img id="qv-img" src="">
                <h2 id="qv-name"></h2>
                <p id="qv-price"></p>
                <p id="qv-desc"></p>
                <button id="qv-add-btn" class="add-btn-main">Savatga qo'shish</button>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-content admin-box">
            <div class="admin-header">
                <h3>Boshqaruv</h3>
                <button class="close-x" onclick="closeAdmin()">&times;</button>
            </div>
            <div class="admin-tabs">
                <button onclick="showTab('p-tab', this)" class="tab-link active">Mahsulotlar</button>
                <button onclick="showTab('c-tab', this)" class="tab-link">Toifalar</button>
            </div>
            
            <div id="p-tab" class="tab-body">
                <div class="input-group">
                    <input type="text" id="p-name" placeholder="Mahsulot nomi">
                    <input type="number" id="p-price" placeholder="Narxi">
                    <select id="p-cat-select"></select>
                    <textarea id="p-desc" placeholder="Mahsulot haqida tavsif..."></textarea>
                    <label class="file-label">
                        🖼 Rasm yuklash
                        <input type="file" id="p-image-input" accept="image/*" style="display:none;">
                    </label>
                    <div id="image-preview" class="preview-box"></div>
                    <button id="main-admin-btn" class="add-btn-main" onclick="addNewProduct()">Onlayn saqlash</button>
                </div>
                <div id="admin-prod-list" class="scroll-list"></div>
            </div>

            <div id="c-tab" class="tab-body" style="display:none;">
                <div class="input-group">
                    <input type="text" id="new-cat-input" placeholder="Yangi toifa nomi">
                    <button class="add-btn-main" onclick="addNewCategory()">Qo'shish</button>
                </div>
                <div id="admin-cat-list" class="scroll-list"></div>
            </div>
        </div>
    </div>

    <div id="cart-widget" class="cart-widget" onclick="toggleCart()">
        <span>🛒 <span id="cart-count">0</span></span>
        <span id="cart-total-info">0 so'm</span>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content cart-box">
            <h3>Savatcha</h3>
            <ul id="cart-items" class="cart-list-ui"></ul>
            <div class="total-summary">Jami: <span id="total-price-display">0</span> so'm</div>
            <textarea id="order-comment" placeholder="Manzil va telefon raqamingiz..."></textarea>
            <button class="checkout-btn" onclick="checkout()">Buyurtma berish</button>
            <button class="close-btn-text" onclick="toggleCart()">Yopish</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
