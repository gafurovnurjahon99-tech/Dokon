<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Premium Market | TG Bot</title>
</head>
<body>
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h2 id="username">Yuklanmoqda...</h2>
                <p id="current-date">Xush kelibsiz!</p>
            </div>
            <button onclick="openAdmin()" class="admin-btn-icon" style="background:none; border:none; font-size: 24px;">⚙️</button>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Mahsulot qidirish..." oninput="searchProducts(this.value)">
    </div>

    <div class="category-scroll" id="category-list"></div>

    <div class="container">
        <div class="product-grid" id="product-grid"></div>
    </div>

    <div class="history-section" style="padding: 15px;">
        <h3 style="color: #1b4d3e;">📜 Buyurtmalar tarixi</h3>
        <div id="order-history-list"></div>
    </div>

    <div id="cart-widget" class="cart-float-btn" onclick="toggleCart()">
        <span>🛒 <span id="cart-count">0</span> ta mahsulot</span>
        <span id="cart-total-info">0 so'm</span>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-content admin-box">
            <div class="admin-header">
                <h3>Boshqaruv Paneli</h3>
                <button class="close-x" onclick="closeAdmin()">&times;</button>
            </div>
            <div class="admin-tabs">
                <button onclick="showTab('p-tab', this)" class="tab-link active">Mahsulotlar</button>
                <button onclick="showTab('o-tab', this)" class="tab-link">Buyurtmalar</button>
                <button onclick="showTab('s-tab', this)" class="tab-link">AI & Stat</button>
            </div>
            
            <div id="p-tab" class="tab-body">
                <div class="input-group">
                    <input type="text" id="p-name" placeholder="Mahsulot nomi">
                    <input type="number" id="p-price" placeholder="Narxi">
                    <input type="number" id="p-stock" placeholder="Sklad miqdori (soni)"> <input type="text" id="p-variants" placeholder="Variantlar (S:100, M:120)">
                    <select id="p-cat-select"></select>
                    <textarea id="p-desc" placeholder="Tavsif..."></textarea>
                    <label class="file-label">🖼 Rasm yuklash <input type="file" id="p-image-input" accept="image/*" style="display:none;"></label>
                    <div id="image-preview" class="preview-box"></div>
                    <button id="main-admin-btn" class="add-btn-main" onclick="addNewProduct()">Saqlash</button>
                </div>
                <div id="admin-prod-list" class="scroll-list"></div>
            </div>

            <div id="o-tab" class="tab-body" style="display:none;">
                <div id="admin-orders-list" class="scroll-list"></div>
            </div>

            <div id="s-tab" class="tab-body" style="display:none;">
                <div id="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
                    <div class="stat-card">Jami tushum: <h3 id="total-revenue">0 so'm</h3></div>
                    <div class="stat-card">Buyurtmalar: <h3 id="total-orders-count">0</h3></div>
                </div>
                <div class="ai-box">
                    <h4>Super AI Agent 🧠</h4>
                    <p id="ai-status">> Tizim tayyor...</p>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="ai-prompt" placeholder="Buyruq yuboring...">
                        <button onclick="askAI()">OK</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content cart-box">
            <h3>Savatcha</h3>
            <ul id="cart-items" class="cart-list-ui"></ul>
            
            <div class="promo-section" style="display: flex; gap: 5px; margin: 10px 0;">
                <input type="text" id="promo-input" placeholder="Promokod" style="flex:1; padding: 8px; border-radius: 8px; border:1px solid #ddd;">
                <button onclick="applyPromo()" style="background: #2ecc71; color: white; border: none; padding: 0 15px; border-radius: 8px;">OK</button>
            </div>

            <div class="total-summary">Jami: <span id="total-price-display">0</span> so'm</div>
            <textarea id="order-comment" placeholder="Manzil va telefon..."></textarea>
            <button class="checkout-btn" onclick="checkout()">Buyurtmani tasdiqlash</button>
            <button class="close-btn-text" onclick="toggleCart()">Yopish</button>
        </div>
    </div>

    <div id="quick-view-modal" class="modal">
        <div class="modal-content quick-box">
            <button class="close-x" onclick="closeQuickView()">&times;</button>
            <img id="qv-img" src="">
            <h2 id="qv-name"></h2>
            <p id="qv-price"></p>
            <p id="qv-desc"></p>
            <button id="qv-add-btn" class="add-btn-main">Savatga qo'shish</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
