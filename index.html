<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Premium Market | TG Bot</title>
</head>
<body>
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h2 id="username">Yuklanmoqda...</h2>
                <p id="current-date">Xush kelibsiz!</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="toggleHistory()" class="admin-btn-icon">📜</button>
                <button onclick="openAdmin()" class="admin-btn-icon">⚙️</button>
            </div>
        </div>
    </header>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="Mahsulot qidirish..." oninput="searchProducts(this.value)">
    </div>

    <div class="category-scroll" id="category-list"></div>

    <div class="container">
        <div class="inner" id="product-grid"></div>
    </div>

    <div id="cart-widget" class="cart-widget" onclick="toggleCart()">
        <span>🛒 <span id="cart-count">0</span> ta</span>
        <span id="cart-total-info">0 so'm</span>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-content admin-box">
            <div class="admin-header">
                <h3>Boshqaruv</h3>
                <button class="close-x" onclick="closeAdmin()">&times;</button>
            </div>
            <div class="admin-tabs">
                <button onclick="showTab('p-tab', this)" class="tab-link active">Mahsulotlar</button>
                <button onclick="showTab('c-tab', this)" class="tab-link">Kategoriyalar</button>
                <button onclick="showTab('o-tab', this)" class="tab-link">Buyurtmalar</button>
                <button onclick="showTab('s-tab', this)" class="tab-link">AI & Stat</button>
            </div>
            
            <div id="p-tab" class="tab-body">
                <div class="input-group">
                    <input type="text" id="p-name" placeholder="Nomi">
                    <input type="number" id="p-price" placeholder="Narxi">
                    <input type="number" id="p-stock" placeholder="Sklad">
                    <input type="text" id="p-variants" placeholder="S:100, M:120">
                    <select id="p-cat-select"></select>
                    <textarea id="p-desc" placeholder="Tavsif..."></textarea>
                    <label class="file-label">🖼 Rasm <input type="file" id="p-image-input" accept="image/*" style="display:none;"></label>
                    <div id="image-preview" class="preview-box"></div>
                    <button id="main-admin-btn" class="add-btn-main" onclick="addNewProduct()">Saqlash</button>
                </div>
                <div id="admin-prod-list" class="scroll-list"></div>
            </div>

            <div id="c-tab" class="tab-body" style="display:none;">
                <div class="input-group">
                    <input type="text" id="new-cat-input" placeholder="Yangi kategoriya">
                    <button class="add-btn-main" onclick="addNewCategory()">+ Qo'shish</button>
                </div>
                <div id="admin-cat-list" class="scroll-list"></div>
            </div>

            <div id="o-tab" class="tab-body" style="display:none;">
                <div id="admin-orders-list" class="scroll-list"></div>
            </div>

            <div id="s-tab" class="tab-body" style="display:none;">
                <div id="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="stat-card">Tushum: <h3 id="total-revenue">0</h3></div>
                    <div class="stat-card">Soni: <h3 id="total-orders-count">0</h3></div>
                </div>
                <div class="ai-box">
                    <h4>AI Admin 🧠</h4>
                    <p id="ai-status">> Tayyor</p>
                    <input type="text" id="ai-prompt" placeholder="Buyruq...">
                    <button onclick="askAI()">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div id="history-modal" class="modal">
        <div class="modal-content admin-box">
            <div class="admin-header">
                <h3>📜 Tarix</h3>
                <button class="close-x" onclick="toggleHistory()">&times;</button>
            </div>
            <div id="order-history-list" class="scroll-list"></div>
        </div>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content cart-box">
            <button class="close-x" onclick="toggleCart()">&times;</button>
            <h3>Savatcha</h3>
            <ul id="cart-items" class="cart-list-ui"></ul>
            <div class="promo-section">
                <input type="text" id="promo-input" placeholder="Promokod">
                <button onclick="applyPromo()">OK</button>
            </div>
            <div class="total-summary">Jami: <span id="total-price-display">0</span> so'm</div>
            <textarea id="order-comment" placeholder="Izoh..."></textarea>
            <button class="checkout-btn" onclick="checkout()">Tasdiqlash</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
